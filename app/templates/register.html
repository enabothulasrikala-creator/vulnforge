{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card bg-dark border-secondary">
            <div class="card-header border-secondary text-center">
                <h3><i class="bi bi-shield-shaded text-danger"></i> Join VulnForge</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="name" class="form-control bg-dark text-light border-secondary" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control bg-dark text-light border-secondary" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control bg-dark text-light border-secondary" required>
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Register</button>
                </form>
                <p class="mt-3 text-center text-secondary">
                    Already registered? <a href="/auth/login" class="text-danger">Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
